server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers (applied to every response, incl. errors) ─────────────
    # CSP: default-deny; scripts only from self (no inline/eval). 'unsafe-inline'
    # is required for style-src because Framer Motion and theme swatches set inline
    # styles at runtime (none from user input, so no CSS-injection vector). Google
    # Fonts are allowed for the imported webfont. connect-src permits the API/S3
    # over https and the realtime socket over wss; img/media allow blob: (decrypted
    # attachment object URLs) and https: (presigned avatar/object URLs).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; media-src 'self' blob: https:; connect-src 'self' https: wss:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # Long-cache fingerprinted assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — all routes resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Local development infrastructure for SecureChat.
# Usage: docker compose -f infra/docker-compose.yml up -d
name: securechat

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-securechat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securechat_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-securechat}
    ports:
      - '5432:5432'
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-securechat}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # Web console
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot job: create the attachments bucket on startup.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin} &&
      mc mb --ignore-existing local/${S3_BUCKET:-securechat-attachments} &&
      echo 'Bucket ready' || true
      "

  server:
    build:
      context: ..
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-securechat}:${POSTGRES_PASSWORD:-securechat_dev_password}@postgres:5432/${POSTGRES_DB:-securechat}?schema=public
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - '4000:4000'
